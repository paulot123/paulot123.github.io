name: Update GitHub Contributions

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-contributions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and write contribution data
        env:
          GH_CONTRIB_TOKEN: ${{ secrets.GH_CONTRIB_TOKEN }}
          GITHUB_USERNAME: paulot123
        run: node scripts/fetch-contributions.mjs

      - name: Commit updated contribution file
        run: |
          if git diff --quiet data/github-contributions.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-contributions.json
          git commit -m "chore: update contribution data"
          git push
